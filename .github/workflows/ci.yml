name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 TalosForge/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 TalosForge/ --max-line-length=100 --extend-ignore=E203,W505,E501

      - name: Run unit tests
        run: |
          pip install pytest pytest-mock
          pytest tests/unit -v --tb=short

      - name: Run integration tests
        run: |
          pytest tests/integration -v --tb=short

      - name: Run Robot Framework tests
        run: |
          pip install robotframework
          robot --outputdir results/robot --loglevel TRACE tests/robot

      - name: Upload Robot Framework results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: robot-results-${{ matrix.python-version }}
          path: results/robot/

  build:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*
