openapi: 3.0.0
info:
  title: Petstore API
  version: 1.0.0
  description: Sample API for TalosForge testing

paths:
  /pet:
    post:
      summary: Add a new pet to the store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Buddy"
                photoUrls:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [available, pending, sold]
              required:
                - name
                - photoUrls
      responses:
        '200':
          description: Successful operation

  /pet/{petId}:
    get:
      summary: Find pet by ID
      parameters:
        - name: petId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successful operation

  /user:
    post:
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                firstName:
                  type: string
                lastName:
                  type: string
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
                phone:
                  type: string
              required:
                - username
                - email
                - password
      responses:
        '200':
          description: Successful operation
